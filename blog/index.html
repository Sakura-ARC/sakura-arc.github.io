<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVELOPMENT LOG | Sakura ARC</title>
    <meta name="description" content="Sakura ARC の開発ログ。インディーゲーム制作の裏側や、AI活用の実験記録など。">
    <meta property="og:title" content="DEVELOPMENT LOG | Sakura ARC">
    <meta property="og:description" content="Sakura ARC の開発ログ。インディーゲーム制作の裏側や、AI活用の実験記録など。">
    <meta property="og:image" content="https://sakuraarc.com/images/saogp.jpg?v=2025">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://sakuraarc.com/images/saogp.jpg?v=2025">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;500;700&display=swap');

        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #e6e6e6;
            --dim-color: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Shippori Mincho", "Noto Sans JP", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1.5rem;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .studio-logo-icon {
            width: 32px;
            height: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .studio-logo-icon:hover {
            opacity: 1;
        }

        .blog-main-title {
            font-family: "Shippori Mincho", serif;
            font-size: 1.2rem;
            letter-spacing: 0.15rem;
            text-decoration: none;
            color: var(--text-color);
        }

        .back-to-portal {
            font-size: 0.7rem;
            color: var(--dim-color);
            text-decoration: none;
            letter-spacing: 0.1rem;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            transition: all 0.3s;
        }

        .back-to-portal:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }

        h1.blog-title {
            font-size: 2rem;
            letter-spacing: 0.2rem;
            margin: 0 0 2rem 0;
            font-weight: 500;
            text-align: left;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .blog-card {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        .blog-card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-image-wrapper {
            overflow: hidden;
            width: 100%;
            height: 100%;
            min-height: 180px;
        }

        .card-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease;
        }

        .blog-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--dim-color);
            margin-bottom: 0.6rem;
            font-family: "Noto Sans JP", sans-serif;
            display: block;
        }

        .card-title {
            font-size: 1.3rem;
            margin: 0 0 0.8rem 0;
            font-weight: 500;
            line-height: 1.4;
            color: #ffffff;
            font-family: "Shippori Mincho", serif;
        }

        .card-excerpt {
            font-size: 0.85rem;
            color: var(--dim-color);
            line-height: 1.6;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: "Noto Sans JP", sans-serif;
        }

        @media (max-width: 768px) {
            .blog-card {
                grid-template-columns: 1fr;
            }
            .card-image-wrapper {
                aspect-ratio: 16 / 9;
                min-height: auto;
            }
            .card-content {
                padding: 1.5rem;
            }
        }

        footer {
            margin-top: 5rem;
            color: var(--dim-color);
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            padding-bottom: 2rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container" id="top">
        <header>
            <div class="logo-group">
                <a href="../" title="Sakura ARC Portal">
                    <img src="../images/logo.webp" alt="SAKURA ARC" class="studio-logo-icon">
                </a>
                <span class="blog-main-title">DEVELOPMENT LOG</span>
            </div>
            <a href="../" class="back-to-portal">HOME</a>
        </header>

        <h1 class="blog-title">Articles</h1>
        
        <div class="blog-grid">
            <a href="20260513_manifesto.html" class="blog-card">
                <div class="card-image-wrapper" style="background-color: #1a1a1a;">
                    <div class="card-image" style="background-image: url('images/manifesto.webp');"></div>
                </div>
                <div class="card-content">
                    <span class="card-date">2026.05.13</span>
                    <h2 class="card-title">Sakura ARC の創作スタンス</h2>
                    <p class="card-excerpt">Steamという世界規模のプラットフォームへ。Sakura ARCのこれからの創作スタンスと、AIを活用する理由について。</p>
                </div>
            </a>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 2rem;">
            <a href="../" style="color: var(--dim-color); text-decoration: none; margin: 0 1rem; font-size: 0.75rem;">HOME</a>
            <a href="index.html" style="color: var(--text-color); text-decoration: none; margin: 0 1rem; font-size: 0.75rem;">BLOG TOP</a>
            <a href="#top" style="color: var(--dim-color); text-decoration: none; margin: 0 1rem; font-size: 0.75rem;">PAGE TOP ↑</a>
        </div>
        &copy; 2025 Sakura ARC All Rights Reserved.
    </footer>
</body>
</html>
