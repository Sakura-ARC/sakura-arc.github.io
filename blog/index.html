<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG | Sakura ARC</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;500;700&display=swap');

        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #e6e6e6;
            --dim-color: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Shippori Mincho", "Noto Sans JP", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 2rem;
        }

        .back-link {
            color: var(--dim-color);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            transition: color 0.3s ease;
            display: inline-block;
            margin-bottom: 2rem;
            font-family: "Noto Sans JP", sans-serif;
        }

        .back-link:hover {
            color: var(--text-color);
        }

        h1.blog-title {
            font-size: 2rem;
            letter-spacing: 0.2rem;
            margin: 0;
            font-weight: 500;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .post-item:hover {
            transform: translateX(10px);
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--dim-color);
            font-family: "Noto Sans JP", sans-serif;
            margin-bottom: 0.5rem;
            display: block;
        }

        .post-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.4;
            display: block;
        }

        .post-link:hover {
            color: var(--dim-color);
        }

        footer {
            margin-top: 4rem;
            color: var(--dim-color);
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            padding-bottom: 2rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-link">← BACK TO SAKURA ARC</a>
            <h1 class="blog-title" style="margin-bottom: 0.3rem;">DEVELOPMENT LOG</h1>
            <div style="font-size: 0.85rem; color: var(--dim-color); letter-spacing: 0.2rem; font-family: 'Noto Sans JP', sans-serif;">開発ブログ</div>
        </header>
        
        <ul class="post-list">
            <li class="post-item">
                <span class="post-date">2026.05.13</span>
                <a href="20260513_manifesto.html" class="post-link">Sakura ARC の創作スタンス</a>
            </li>
        </ul>
    </div>

    <footer>
        &copy; 2026 Sakura ARC All Rights Reserved.
    </footer>
</body>
</html>
